<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manage Subscription — anybrowse</title>
  <meta name="description" content="Manage your anybrowse subscription. Cancel anytime, update payment method, or view invoices.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f4f0eb; color: #111; min-height: 100vh; }
    nav { background: #111; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
    nav a { color: #888; text-decoration: none; font-size: 0.9rem; }
    nav a:hover { color: #e8e4df; }
    .logo { color: #d94400; font-weight: 700; font-size: 1.1rem; }
    .container { max-width: 480px; margin: 80px auto; padding: 0 24px; }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 12px; }
    p { color: #6b6460; margin-bottom: 32px; line-height: 1.6; }
    input { width: 100%; padding: 14px 16px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; font-family: inherit; background: white; margin-bottom: 16px; }
    input:focus { outline: none; border-color: #d94400; }
    button { width: 100%; padding: 14px; background: #d94400; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; font-family: inherit; }
    button:hover { background: #b83800; }
    button:disabled { background: #999; cursor: not-allowed; }
    .note { margin-top: 24px; font-size: 0.85rem; color: #6b6460; text-align: center; }
    .note a { color: #d94400; text-decoration: none; }
    .note a:hover { text-decoration: underline; }
    .error-msg { background: #fee; border: 1px solid #fcc; border-radius: 8px; padding: 12px 16px; color: #c00; font-size: 0.9rem; margin-bottom: 16px; display: none; }
    @media (max-width: 600px) {
      nav { padding: 16px 20px; }
      .container { margin: 48px auto; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="logo">anybrowse</a>
    <div style="display:flex;gap:32px;">
      <a href="/docs">Docs</a>
      <a href="/vault">Vault</a>
      <a href="/pricing">Pricing</a>
      <a href="/dashboard">Dashboard</a>
    </div>
  </nav>
  <div class="container">
    <h1>Manage subscription</h1>
    <p>Enter the email you used to subscribe. You can cancel, update your payment method, or view invoices.</p>
    <div class="error-msg" id="error-msg"></div>
    <form method="POST" action="/portal" id="portal-form">
      <input type="email" name="email" id="email-input" placeholder="your@email.com" required autocomplete="email">
      <button type="submit" id="submit-btn">Open billing portal</button>
    </form>
    <p class="note">Need help? Email <a href="mailto:hello@anybrowse.dev">hello@anybrowse.dev</a> — we respond within 24 hours.</p>
    <p class="note" style="margin-top:12px;">
      <a href="/dashboard">← Back to dashboard</a>
    </p>
  </div>
  <script>
    const form = document.getElementById('portal-form');
    const btn = document.getElementById('submit-btn');
    const errMsg = document.getElementById('error-msg');
    form.addEventListener('submit', () => {
      btn.disabled = true;
      btn.textContent = 'Opening portal…';
      errMsg.style.display = 'none';
    });
  </script>
</body>
</html>
